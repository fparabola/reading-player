<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本播放器 | Text Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 播放窗口 */
        .player-window {
            width: 100%;
            height: 50vh;
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid #667eea;
        }

        .subtitle-container {
            width: 95%;
            max-width: 1400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            text-align: center;
            padding: 20px 0;
            transition: all 0.3s ease;
            overflow-y: auto; /* 添加垂直滚动 */
            overflow-x: hidden;
        }

        /* 自定义滚动条样式 */
        .subtitle-container::-webkit-scrollbar {
            width: 6px;
        }

        .subtitle-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .subtitle-container::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 3px;
        }

        .subtitle-container::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.8);
        }

        .sentence-display {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            justify-content: center;
            min-height: 0;
        }

        .subtitle-line {
            font-size: clamp(18px, 3.5vw, 30px);
            font-weight: 700;
            color: #fff;
            line-height: 1.4;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.4s ease forwards;
            word-wrap: break-word; /* 允许长单词换行 */
            overflow-wrap: break-word;
            hyphens: auto; /* 自动断字 */
            max-width: 100%; /* 确保不超出容器 */
        }

        /* 当句子很长时显示省略号 */
        .subtitle-line.truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 控制区域 */
        .controls-section {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* 书籍章节选择 */
        .book-select-section {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .book-select-section select {
            padding: 10px 15px;
            background: #2a2a4e;
            color: #eee;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            min-width: 150px;
        }

        .book-select-section select:hover {
            border-color: #667eea;
        }

        .progress-info {
            font-size: 14px;
            color: #888;
        }

        .progress-bar {
            width: 90%;
            max-width: 800px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        /* 控制按钮 */
        .control-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #333;
            color: #eee;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #444;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #c82333;
        }

        /* 播放速度控制 */
        .speed-control {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .speed-control label {
            font-size: 14px;
            color: #888;
        }

        .speed-btn {
            padding: 6px 12px;
            font-size: 14px;
        }

        .speed-btn.active {
            background: #667eea;
            color: white;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误提示 */
        .error-message {
            background: rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            color: #666;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 18px;
        }

        /* 章节导航按钮 */
        .chapter-nav {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chapter-nav-btn {
            padding: 8px 12px;
            font-size: 14px;
        }

        /* 当前章节显示 */
        .current-chapter {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .btn {
                padding: 10px 16px;
                font-size: 14px;
            }
            .subtitle-line {
                font-size: clamp(16px, 4.5vw, 22px);
                line-height: 1.3;
            }
            .subtitle-container {
                width: 98%;
                padding: 15px 0;
                gap: 8px;
            }
            .book-select-section select {
                min-width: 120px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .subtitle-line {
                font-size: clamp(14px, 5vw, 20px);
            }
        }
    </style>
</head>
<body>
    <!-- 播放窗口 -->
    <div class="player-window">
        <div class="subtitle-container" id="subtitleContainer">
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 19V6l12 7-12 7z"/>
                    <path d="M3 6v12l12-7-12-7z" style="opacity:0.5"/>
                </svg>
                <p>请选择书籍和章节开始播放</p>
                <p style="font-size: 14px;">Please select a book and chapter to start playing</p>
            </div>
            <div class="sentence-display" id="sentenceDisplay"></div>
        </div>
    </div>

    <!-- 控制区域 -->
    <div class="controls-section">
        <!-- 书籍章节选择 -->
        <div class="book-select-section">
            <select id="bookSelect" onchange="onBookChange()">
                <option value="">-- 选择书籍 Select Book --</option>
            </select>
            <select id="chapterSelect" onchange="onChapterChange()" disabled>
                <option value="">-- 选择章节 Select Chapter --</option>
            </select>
            <button class="btn btn-primary" onclick="loadChapter()" id="btnLoad" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                加载 Load
            </button>
        </div>

        <!-- 章节导航 -->
        <div class="chapter-nav" id="chapterNav" style="display: none;">
            <button class="btn btn-secondary chapter-nav-btn" onclick="prevChapter()" id="btnPrevChapter" disabled>
                ◀ 上一章
            </button>
            <span class="current-chapter" id="currentChapter"></span>
            <button class="btn btn-secondary chapter-nav-btn" onclick="nextChapter()" id="btnNextChapter" disabled>
                下一章 ▶
            </button>
        </div>

        <!-- 进度信息 -->
        <div class="progress-info" id="progressInfo">未加载 | Not loaded</div>

        <!-- 进度条 -->
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" style="width: 0%"></div>
        </div>

        <!-- 播放速度控制 -->
        <div class="speed-control">
            <label>播放速度 Speed:</label>
            <button class="btn btn-secondary speed-btn" data-speed="3000" onclick="setSpeed(3000)">慢 3s</button>
            <button class="btn btn-secondary speed-btn active" data-speed="2000" onclick="setSpeed(2000)">中 2s</button>
            <button class="btn btn-secondary speed-btn" data-speed="1000" onclick="setSpeed(1000)">快 1s</button>
        </div>

        <!-- 控制按钮 -->
        <div class="control-buttons">
            <button class="btn btn-secondary" onclick="gotoBeginning()" id="btnBeginning" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="19 20 9 12 19 4 19 20"/>
                    <line x1="5" y1="19" x2="5" y2="5"/>
                </svg>
            </button>
            <button class="btn btn-secondary" onclick="previousPage()" id="btnPrev" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="15 18 9 12 15 6 15 18"/>
                </svg>
            </button>
            <button class="btn btn-success" onclick="togglePlay()" id="btnPlay" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="playIcon">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
            </button>
            <button class="btn btn-secondary" onclick="nextPage()" id="btnNext" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="9 18 15 12 9 6 9 18"/>
                </svg>
            </button>
            <button class="btn btn-secondary" onclick="gotoEnd()" id="btnEnd" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 4 15 12 5 20 5 4"/>
                    <line x1="19" y1="5" x2="19" y2="19"/>
                </svg>
            </button>
        </div>

        <div id="errorMessage"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        const DEFAULT_MIN_SIZE = 500; // 默认获取的文本最小长度

        let currentBook = '';
        let currentChapter = '';
        let currentPosition = 0;
        let chapterEndPosition = 0;
        let currentSentences = [];
        let currentSentenceIndex = 0;
        let maxSentencesPerPage = 5;
        let isPlaying = false;
        let playInterval = null;
        let playSpeed = 2000;
        let bookChapters = []; // 存储当前书的章节列表

        // 初始化最大句子数
        function initMaxSentences() {
            const windowHeight = window.innerHeight * 0.5;
            const windowWidth = window.innerWidth;
            // 更精确的字体大小计算（基于CSS中的clamp值）
            let fontSize;
            if (windowWidth <= 480) {
                fontSize = Math.max(14, Math.min(20, windowWidth * 0.05));
            } else if (windowWidth <= 768) {
                fontSize = Math.max(16, Math.min(22, windowWidth * 0.045));
            } else {
                fontSize = Math.max(18, Math.min(30, windowWidth * 0.035));
            }
            // 每行高度（字体大小 + 行间距）
            const lineHeight = fontSize * 1.4;
            // 容器可用高度（减去padding）
            const availableHeight = windowHeight * 0.9;
            // 计算可显示的行数
            const maxLines = Math.floor(availableHeight / lineHeight / 1.2);
            // 考虑padding和gap
            maxSentencesPerPage = Math.max(2, Math.min(10, maxLines));
        }

        initMaxSentences();
        window.addEventListener('resize', () => {
            initMaxSentences();
            if (currentSentences.length > 0) displaySentences();
        });

        // 页面加载时获取书籍列表
        window.addEventListener('DOMContentLoaded', loadBooks);

        // 加载书籍列表
        async function loadBooks() {
            try {
                const response = await fetch(`${API_URL}/books/list`);
                if (!response.ok) throw new Error('获取书籍列表失败');

                const data = await response.json();
                const bookSelect = document.getElementById('bookSelect');
                bookSelect.innerHTML = '<option value="">-- 选择书籍 Select Book --</option>';

                data.books.forEach(book => {
                    const option = document.createElement('option');
                    option.value = book;
                    option.textContent = book;
                    bookSelect.appendChild(option);
                });
            } catch (error) {
                console.error('加载书籍失败:', error);
                showError('加载书籍列表失败，请确保服务已启动');
            }
        }

        // 书籍改变时加载章节列表
        async function onBookChange() {
            const bookSelect = document.getElementById('bookSelect');
            currentBook = bookSelect.value;
            const chapterSelect = document.getElementById('chapterSelect');
            const btnLoad = document.getElementById('btnLoad');

            chapterSelect.innerHTML = '<option value="">-- 选择章节 Select Chapter --</option>';
            chapterSelect.disabled = true;
            btnLoad.disabled = true;

            if (!currentBook) return;

            try {
                const response = await fetch(`${API_URL}/chapter/${encodeURIComponent(currentBook)}`);
                if (!response.ok) throw new Error('获取章节列表失败');

                const data = await response.json();
                bookChapters = data.chapters;

                bookChapters.forEach(chapter => {
                    const option = document.createElement('option');
                    option.value = chapter.name;
                    option.textContent = chapter.name;
                    chapterSelect.appendChild(option);
                });

                chapterSelect.disabled = false;
                btnLoad.disabled = false;
            } catch (error) {
                console.error('加载章节失败:', error);
                showError('加载章节列表失败');
            }
        }

        // 章节改变时
        function onChapterChange() {
            const chapterSelect = document.getElementById('chapterSelect');
            currentChapter = chapterSelect.value;
        }

        // 加载章节
        async function loadChapter() {
            if (!currentBook || !currentChapter) {
                showError('请先选择书籍和章节');
                return;
            }

            showLoading(true);
            clearError();
            currentPosition = 0;
            currentSentences = [];
            currentSentenceIndex = 0;
            isPlaying = false;
            if (playInterval) clearInterval(playInterval);

            try {
                // 获取章节内容
                const content = await fetchChapterContent(currentBook, currentChapter, currentPosition);
                chapterEndPosition = content.end_position;

                // 分句
                const sentences = await splitText(content.text);
                if (sentences.length === 0) {
                    showError('章节内容为空');
                    showLoading(false);
                    return;
                }

                currentSentences = sentences;
                currentSentenceIndex = 0;

                // 更新UI
                document.getElementById('chapterNav').style.display = 'flex';
                document.getElementById('currentChapter').textContent = currentChapter.replace('.txt', '');
                updateChapterNav();

                displaySentences();
                updatePlayButtons();

                // 更新播放按钮图标
                document.getElementById('playIcon').innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
                document.getElementById('btnPlay').classList.add('btn-success');
                document.getElementById('btnPlay').classList.remove('btn-danger');

            } catch (error) {
                showError('加载章节失败: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // 获取章节内容
        async function fetchChapterContent(book, chapter, position) {
            const minSize = DEFAULT_MIN_SIZE;
            const url = `${API_URL}/chapter/${encodeURIComponent(book)}/${encodeURIComponent(chapter)}?position=${position}&min_size=${minSize}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error('获取章节内容失败');
            return await response.json();
        }

        // 分句
        async function splitText(text) {
            const response = await fetch(`${API_URL}/split`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: text,
                    language: 'en',
                    method: 'r'
                })
            });
            if (!response.ok) throw new Error('分句失败');
            const data = await response.json();
            return data.sentences || [];
        }

        // 显示当前页句子
        function displaySentences() {
            const emptyState = document.getElementById('emptyState');
            const sentenceDisplay = document.getElementById('sentenceDisplay');

            if (currentSentences.length === 0) {
                emptyState.style.display = 'flex';
                sentenceDisplay.innerHTML = '';
                return;
            }

            emptyState.style.display = 'none';

            // 显示下maxSentencesPerPage个句子
            const endIndex = Math.min(currentSentenceIndex + maxSentencesPerPage, currentSentences.length);
            const displaySentences = currentSentences.slice(currentSentenceIndex, endIndex);

            sentenceDisplay.innerHTML = displaySentences.map((s, i) =>
                `<div class="subtitle-line" style="animation-delay: ${i * 0.1}s">${escapeHtml(s)}</div>`
            ).join('');

            updateProgress();
        }

        // 更新进度
        function updateProgress() {
            document.getElementById('progressInfo').textContent =
                `句子${currentSentenceIndex + 1}-${Math.min(currentSentenceIndex + maxSentencesPerPage, currentSentences.length)}`;

            // 进度条简单估算
            if (chapterEndPosition > 0) {
                const progress = Math.min(100, (currentPosition / (chapterEndPosition || 1)) * 100);
                document.querySelector('.progress-fill').style.width = `${progress}%`;
            }
        }

        // 下一页
        async function nextPage() {
            const nextIndex = currentSentenceIndex + maxSentencesPerPage;

            if (nextIndex < currentSentences.length) {
                // 当前还有句子，直接翻页
                currentSentenceIndex = nextIndex;
                displaySentences();
            } else {
                // 当前句子已用完，获取更多内容
                await loadMoreContent();
            }
        }

        // 加载更多内容
        async function loadMoreContent() {
            try {
                const content = await fetchChapterContent(currentBook, currentChapter, currentPosition);

                if (content.text.length === 0) {
                    // 章节结束
                    if (isPlaying) {
                        pause();
                    }
                    return;
                }

                currentPosition = content.end_position;
                chapterEndPosition = content.end_position;

                const sentences = await splitText(content.text);
                if (sentences.length === 0) {
                    if (isPlaying) pause();
                    return;
                }

                // 合并句子
                currentSentences = [...currentSentences.slice(currentSentenceIndex), ...sentences];
                currentSentenceIndex = 0;

                displaySentences();

                // 如果刚够显示不满，继续加载
                if (currentSentences.length < maxSentencesPerPage) {
                    await loadMoreContent();
                }

            } catch (error) {
                console.error('加载更多内容失败:', error);
                if (isPlaying) pause();
            }
        }

        // 上一页
        function previousPage() {
            const prevIndex = currentSentenceIndex - maxSentencesPerPage;
            if (prevIndex >= 0) {
                currentSentenceIndex = prevIndex;
                displaySentences();
            } else {
                // 已到开头
                currentSentenceIndex = 0;
                displaySentences();
            }
        }

        // 跳到开头
        function gotoBeginning() {
            currentSentenceIndex = 0;
            displaySentences();
        }

        // 跳到结尾
        function gotoEnd() {
            currentSentenceIndex = Math.max(0, currentSentences.length - maxSentencesPerPage);
            displaySentences();
        }

        // 播放/暂停
        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }

        // 播放
        function play() {
            if (currentSentences.length === 0) return;

            isPlaying = true;

            document.getElementById('playIcon').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
            document.getElementById('btnPlay').classList.remove('btn-success');
            document.getElementById('btnPlay').classList.add('btn-danger');

            playInterval = setInterval(async () => {
                await nextPage();
            }, playSpeed);
        }

        // 暂停
        function pause() {
            isPlaying = false;

            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }

            document.getElementById('playIcon').innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
            document.getElementById('btnPlay').classList.add('btn-success');
            document.getElementById('btnPlay').classList.remove('btn-danger');
        }

        // 设置速度
        function setSpeed(speed) {
            playSpeed = speed;

            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.speed) === speed) {
                    btn.classList.add('active');
                }
            });

            if (isPlaying) {
                pause();
                play();
            }
        }

        // 更新播放按钮状态
        function updatePlayButtons() {
            const hasContent = currentSentences.length > 0;
            document.getElementById('btnPlay').disabled = !hasContent;
            document.getElementById('btnPrev').disabled = !hasContent || currentSentenceIndex <= 0;
            document.getElementById('btnBeginning').disabled = !hasContent || currentSentenceIndex <= 0;
            document.getElementById('btnNext').disabled = !hasContent;
            document.getElementById('btnEnd').disabled = !hasContent;
        }

        // 更新章节导航按钮
        function updateChapterNav() {
            const currentIndex = bookChapters.findIndex(c => c.name === currentChapter);
            document.getElementById('btnPrevChapter').disabled = currentIndex <= 0;
            document.getElementById('btnNextChapter').disabled = currentIndex >= bookChapters.length - 1 || bookChapters.length === 0;
        }

        // 上一章
        function prevChapter() {
            const currentIndex = bookChapters.findIndex(c => c.name === currentChapter);
            if (currentIndex > 0) {
                document.getElementById('chapterSelect').value = bookChapters[currentIndex - 1].name;
                currentChapter = bookChapters[currentIndex - 1].name;
                loadChapter();
            }
        }

        // 下一章
        function nextChapter() {
            const currentIndex = bookChapters.findIndex(c => c.name === currentChapter);
            if (currentIndex < bookChapters.length - 1) {
                document.getElementById('chapterSelect').value = bookChapters[currentIndex + 1].name;
                currentChapter = bookChapters[currentIndex + 1].name;
                loadChapter();
            }
        }

        // 显示加载状态
        function showLoading(show) {
            const emptyState = document.getElementById('emptyState');
            const sentenceDisplay = document.getElementById('sentenceDisplay');

            if (show) {
                emptyState.style.display = 'none';
                sentenceDisplay.innerHTML = '<div class="loading"></div>';
            }
        }

        // 显示错误
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerHTML = `<div class="error-message">${message}</div>`;
        }

        // 清除错误
        function clearError() {
            document.getElementById('errorMessage').innerHTML = '';
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 点击进度条跳转
        document.getElementById('progressBar').addEventListener('click', (e) => {
            if (currentSentences.length === 0) return;

            const rect = e.target.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percent = clickX / rect.width;

            // 简单估算跳转位置
            const totalSentences = Math.ceil((chapterEndPosition || 1) / 20); // 估算总句子数
            const targetIndex = Math.floor(percent * totalSentences);
            currentSentenceIndex = Math.max(0, Math.min(currentSentences.length - maxSentencesPerPage, targetIndex));

            displaySentences();
        });
    </script>
</body>
</html>

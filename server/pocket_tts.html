<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket TTS 测试页</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: #fffaf2;
            --panel-strong: #fff;
            --ink: #1d2a33;
            --subtle: #64707a;
            --line: #dbcdb7;
            --accent: #c25b2f;
            --accent-strong: #9e4520;
            --accent-soft: #f0d8c8;
            --ok: #1f7a4d;
            --warn: #8b2e2e;
            --shadow: 0 18px 40px rgba(65, 45, 22, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(194, 91, 47, 0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(67, 114, 142, 0.18), transparent 24%),
                linear-gradient(160deg, #efe6d8 0%, #f7f2e9 45%, #ece5d7 100%);
            padding: 24px;
        }

        .shell {
            max-width: 980px;
            margin: 0 auto;
        }

        .hero {
            margin-bottom: 18px;
            padding: 28px;
            border: 1px solid rgba(219, 205, 183, 0.9);
            border-radius: 26px;
            background: rgba(255, 250, 242, 0.86);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
        }

        .eyebrow {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent-strong);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 14px 0 8px;
            font-size: clamp(32px, 6vw, 54px);
            line-height: 1;
        }

        .hero p {
            margin: 0;
            color: var(--subtle);
            font-size: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.25fr 0.9fr;
            gap: 18px;
        }

        .card {
            padding: 22px;
            border-radius: 24px;
            border: 1px solid var(--line);
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .section-title {
            margin: 0 0 16px;
            font-size: 18px;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 700;
            color: var(--subtle);
        }

        .input,
        .textarea,
        .select,
        .button {
            width: 100%;
            border-radius: 16px;
            border: 1px solid var(--line);
            font: inherit;
        }

        .input,
        .select {
            height: 48px;
            padding: 0 14px;
            background: var(--panel-strong);
        }

        .textarea {
            min-height: 220px;
            padding: 14px;
            resize: vertical;
            background: var(--panel-strong);
            line-height: 1.6;
        }

        .input:focus,
        .textarea:focus,
        .select:focus {
            outline: 2px solid rgba(194, 91, 47, 0.25);
            border-color: var(--accent);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .button {
            width: auto;
            min-width: 132px;
            height: 48px;
            padding: 0 18px;
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
        }

        .button:hover {
            transform: translateY(-1px);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .button-primary {
            color: #fff;
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
        }

        .button-secondary {
            color: var(--ink);
            background: #f6efe4;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 36px;
            padding: 8px 12px;
            border-radius: 999px;
            background: #f6efe4;
            color: var(--subtle);
            font-size: 13px;
            font-weight: 700;
        }

        .pill.ok {
            color: var(--ok);
            background: rgba(31, 122, 77, 0.11);
        }

        .pill.error {
            color: var(--warn);
            background: rgba(139, 46, 46, 0.11);
        }

        .meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .result-box {
            min-height: 160px;
            padding: 16px;
            border: 1px dashed var(--line);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.66);
        }

        .result-box p {
            margin: 0;
            line-height: 1.6;
            color: var(--subtle);
        }

        audio {
            width: 100%;
            margin-top: 14px;
        }

        .hint {
            margin-top: 10px;
            font-size: 12px;
            color: var(--subtle);
            line-height: 1.6;
        }

        .code {
            font-family: Consolas, "Courier New", monospace;
            padding: 2px 6px;
            border-radius: 8px;
            background: #f2eadf;
        }

        @media (max-width: 860px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="hero">
            <span class="eyebrow">Pocket TTS</span>
            <h1>静态测试页</h1>
            <p>直接调用服务端的 <span class="code">/tts/pocket</span>，生成并播放 wav 音频。</p>
        </section>

        <div class="grid">
            <section class="card">
                <h2 class="section-title">请求参数</h2>

                <div class="field">
                    <label for="apiBase">服务地址</label>
                    <input id="apiBase" class="input" value="http://localhost:8000" />
                </div>

                <div class="row">
                    <div class="field">
                        <label for="voice">Voice</label>
                        <select id="voice" class="select">
                            <option value="alba">alba</option>
                            <option value="marius">marius</option>
                            <option value="javert">javert</option>
                            <option value="jean">jean</option>
                            <option value="fantine">fantine</option>
                            <option value="cosette">cosette</option>
                            <option value="eponine">eponine</option>
                            <option value="azelma">azelma</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="customVoice">自定义 Voice</label>
                        <input id="customVoice" class="input" placeholder="留空则使用左侧内置 voice" />
                    </div>
                </div>

                <div class="field">
                    <label for="text">文本</label>
                    <textarea id="text" class="textarea">Hello from Pocket TTS. This page calls the server endpoint directly and plays the generated audio in your browser.</textarea>
                </div>

                <div class="actions">
                    <button id="generateBtn" class="button button-primary">生成语音</button>
                    <button id="sampleBtn" class="button button-secondary">填入示例</button>
                    <button id="clearBtn" class="button button-secondary">清空</button>
                </div>

                <div class="hint">
                    如果你想测试本地声音文件或导出的 <span class="code">.safetensors</span>，把路径填到“自定义 Voice”里即可。
                </div>
            </section>

            <section class="card">
                <h2 class="section-title">返回结果</h2>

                <div class="meta">
                    <div id="healthPill" class="pill">服务状态未检查</div>
                    <div id="requestPill" class="pill">等待请求</div>
                </div>

                <div id="resultBox" class="result-box">
                    <p>点击“生成语音”后，这里会显示请求结果和音频信息。</p>
                </div>

                <audio id="audioPlayer" controls hidden></audio>

                <div class="actions" style="margin-top: 14px;">
                    <a id="downloadLink" class="button button-secondary" style="display:none; align-items:center; justify-content:center; text-decoration:none;" download="pocket-tts.wav">下载 wav</a>
                    <button id="healthBtn" class="button button-secondary">检查服务</button>
                </div>

                <div class="hint">
                    页面只依赖浏览器原生 <span class="code">fetch</span>。如果服务启用了当前项目里的 CORS 设置，直接用文件方式打开这个页面也能访问接口。
                </div>
            </section>
        </div>
    </div>

    <script>
        const apiBaseInput = document.getElementById("apiBase");
        const voiceSelect = document.getElementById("voice");
        const customVoiceInput = document.getElementById("customVoice");
        const textInput = document.getElementById("text");
        const generateBtn = document.getElementById("generateBtn");
        const sampleBtn = document.getElementById("sampleBtn");
        const clearBtn = document.getElementById("clearBtn");
        const healthBtn = document.getElementById("healthBtn");
        const healthPill = document.getElementById("healthPill");
        const requestPill = document.getElementById("requestPill");
        const resultBox = document.getElementById("resultBox");
        const audioPlayer = document.getElementById("audioPlayer");
        const downloadLink = document.getElementById("downloadLink");

        let currentAudioUrl = "";

        function normalizeBaseUrl() {
            return apiBaseInput.value.trim().replace(/\/+$/, "");
        }

        function getVoiceValue() {
            const customVoice = customVoiceInput.value.trim();
            return customVoice || voiceSelect.value;
        }

        function setPill(element, text, type) {
            element.textContent = text;
            element.className = "pill" + (type ? ` ${type}` : "");
        }

        function setResult(message, isError = false) {
            resultBox.innerHTML = `<p style="${isError ? "color: var(--warn);" : ""}">${escapeHtml(message)}</p>`;
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function releaseAudioUrl() {
            if (currentAudioUrl) {
                URL.revokeObjectURL(currentAudioUrl);
                currentAudioUrl = "";
            }
        }

        async function checkHealth() {
            const baseUrl = normalizeBaseUrl();
            if (!baseUrl) {
                setPill(healthPill, "服务地址为空", "error");
                return;
            }

            try {
                const response = await fetch(`${baseUrl}/health`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                setPill(healthPill, "服务在线", "ok");
            } catch (error) {
                setPill(healthPill, `服务不可用: ${error.message}`, "error");
            }
        }

        async function generateAudio() {
            const text = textInput.value.trim();
            const baseUrl = normalizeBaseUrl();
            const voice = getVoiceValue();

            if (!baseUrl) {
                setResult("服务地址不能为空。", true);
                return;
            }
            if (!text) {
                setResult("文本不能为空。", true);
                return;
            }

            generateBtn.disabled = true;
            setPill(requestPill, "请求中...", "");
            setResult("正在请求 Pocket TTS，请等待模型冷启动或缓存命中。");

            try {
                const url = `${baseUrl}/tts/pocket?text=${encodeURIComponent(text)}&voice=${encodeURIComponent(voice)}`;
                const response = await fetch(url);
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`${response.status} ${errorText}`);
                }

                const blob = await response.blob();
                releaseAudioUrl();
                currentAudioUrl = URL.createObjectURL(blob);

                audioPlayer.hidden = false;
                audioPlayer.src = currentAudioUrl;
                audioPlayer.load();

                downloadLink.style.display = "inline-flex";
                downloadLink.href = currentAudioUrl;

                setPill(requestPill, "请求成功", "ok");
                setResult(`返回成功。voice=${voice}，音频大小=${blob.size} bytes，类型=${blob.type || "audio/wav"}。`);
            } catch (error) {
                audioPlayer.hidden = true;
                audioPlayer.removeAttribute("src");
                downloadLink.style.display = "none";
                setPill(requestPill, "请求失败", "error");
                setResult(`请求失败：${error.message}`, true);
            } finally {
                generateBtn.disabled = false;
            }
        }

        sampleBtn.addEventListener("click", () => {
            textInput.value = "Pocket TTS runs on CPU and is easy to integrate. This static page sends text to the server and plays the generated wave file.";
            voiceSelect.value = "alba";
            customVoiceInput.value = "";
        });

        clearBtn.addEventListener("click", () => {
            textInput.value = "";
            customVoiceInput.value = "";
            releaseAudioUrl();
            audioPlayer.pause();
            audioPlayer.hidden = true;
            audioPlayer.removeAttribute("src");
            downloadLink.style.display = "none";
            setPill(requestPill, "等待请求", "");
            setResult("已清空。");
        });

        healthBtn.addEventListener("click", checkHealth);
        generateBtn.addEventListener("click", generateAudio);

        window.addEventListener("beforeunload", releaseAudioUrl);
        checkHealth();
    </script>
</body>
</html>
